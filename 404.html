<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STACKLY-Sync Interrupted | 404 Not Found</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Container */
        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 80px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            position: relative;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Glitch Effect */
        .glitch {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 800;
            margin: 0;
            position: relative;
            color: #fff;
            letter-spacing: -5px;
            line-height: 1;
        }

        .glitch::before, .glitch::after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .glitch::before {
            color: var(--accent-color);
            z-index: -1;
            animation: glitchEffect 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        .glitch::after {
            color: #d3d3d3;
            z-index: -2;
            animation: glitchEffect 0.3s cubic-bezier(.25, .46, .45, .94) reverse both infinite;
            display: none; /* Only show on hover for subtle effect */
        }

        .error-card:hover .glitch::after { display: block; }

        @keyframes glitchEffect {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* Biological Particles */
        .bio-particle {
            position: absolute;
            background: radial-gradient(circle, rgba(0, 116, 217, 0.1) 0%, transparent 70%);
            border: 1px solid rgba(0, 116, 217, 0.05);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: floatBall 20s linear infinite;
        }

        @keyframes floatBall {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(100px, 100px) rotate(120deg); }
            66% { transform: translate(-50px, 200px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .status-text {
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: block;
        }

        .description {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .error-card { padding: 40px 20px; border-radius: 30px; }
            .btn-group { flex-direction: column; }
            .description { font-size: 1rem; }
        }
    </style>
</head>
<body>
   

    <!-- Background Elements -->
    <div class="bio-particle" style="width: 300px; height: 300px; top: 10%; left: 5%; animation-duration: 25s;"></div>
    <div class="bio-particle" style="width: 200px; height: 200px; bottom: 15%; right: 10%; animation-duration: 30s; border-color: rgba(255, 65, 54, 0.05);"></div>
    <div class="bio-particle" style="width: 150px; height: 150px; top: 40%; right: 20%; animation-duration: 18s;"></div>

    <div class="error-container">
        <div class="error-card">
            <span class="status-text">Signal Lost</span>
            <h1 class="glitch">404</h1>
            <p class="description">
                The biological pathway you are looking for has been terminated or moved to a restricted clearance level.
            </p>
            <div class="btn-group">
                <a href="#" onclick="history.back(); return false;" class="btn btn-outline" style="padding: 16px 32px; border-radius: 50px; border-color: rgba(255,255,255,0.2); color: #fff;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Go Back
                </a>
                <a href="../index.html" class="btn" style="padding: 16px 32px; border-radius: 50px; background: linear-gradient(135deg, #ff6b3d, #ff3d00); color: #fff; border: none; box-shadow: 0 10px 20px rgba(255, 61, 0, 0.2);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');
            
            if (hamburger) {
                hamburger.addEventListener('click', () => {
                    hamburger.classList.toggle('active');
                    navLinks.classList.toggle('active');
                });
            }

            // Mouse interaction for particles
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                document.querySelectorAll('.bio-particle').forEach((p, i) => {
                    const speed = (i + 1) * 20;
                    p.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
                });
            });
        });
    </script>
</body>
</html>
